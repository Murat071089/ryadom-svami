/* HEADER NAV */

.cosmos-back { width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; flex-shrink: 0; transition: background 0.2s; }
.cosmos-back:hover { background: rgba(255,255,255,0.12); }

.cosmos-clear-btn { padding: 8px 14px; border-radius: 12px; background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: rgba(239,68,68,0.9); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; flex-shrink: 0; }

.sentence-bar { position: fixed; top: 65px; left: 0; right: 0; z-index: 99; padding: 10px 16px; background: rgba(2,8,24,0.8); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.06); min-height: 56px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

<script>
(function() {

        {id:'w12', cat:'actions', emoji:'🚶', label:'Иди'},
        {id:'w13', cat:'actions', emoji:'⛔', label:'Стоп'},

        // Еда

        {id:'w19', cat:'food',    emoji:'🍞', label:'Хлеб'},
        {id:'w20', cat:'food',    emoji:'🥛', label:'Молоко'},
        {id:'w21', cat:'food',    emoji:'🧃', label:'Сок'},
        {id:'w22', cat:'food',    emoji:'🍗', label:'Курица'},
        {id:'w23', cat:'food',    emoji:'🍚', label:'Каша'},
        {id:'w24', cat:'food',    emoji:'🍪', label:'Печенье'},
        {id:'w25', cat:'food',    emoji:'🍌', label:'Банан'},
        {id:'w26', cat:'food',    emoji:'💧', label:'Вода'},
        {id:'w27', cat:'food',    emoji:'🍫', label:'Шоколад'},
        // Чувства
        {id:'w28', cat:'feelings',emoji:'😊', label:'Хорошо'},
        {id:'w29', cat:'feelings',emoji:'😢', label:'Грустно'},
        {id:'w30', cat:'feelings',emoji:'😡', label:'Злюсь'},
        {id:'w31', cat:'feelings',emoji:'😰', label:'Страшно'},
        {id:'w32', cat:'feelings',emoji:'😴', label:'Устал'},
        {id:'w33', cat:'feelings',emoji:'🤒', label:'Больно'},
        {id:'w34', cat:'feelings',emoji:'😃', label:'Весело'},
        {id:'w35', cat:'feelings',emoji:'🤗', label:'Радость'},
        // Место
        {id:'w36', cat:'places',  emoji:'🏠', label:'Домой'},
        {id:'w37', cat:'places',  emoji:'🚽', label:'Туалет'},
        {id:'w38', cat:'places',  emoji:'🛏️', label:'Кровать'},
        {id:'w39', cat:'places',  emoji:'🌳', label:'Улица'},
        {id:'w40', cat:'places',  emoji:'🚗', label:'Машина'},
        {id:'w41', cat:'places',  emoji:'🏥', label:'Врач'},
        {id:'w42', cat:'places',  emoji:'🛁', label:'Ванна'},
        // Разное
        {id:'w43', cat:'misc',    emoji:'📺', label:'Мультики'},
        {id:'w44', cat:'misc',    emoji:'🧸', label:'Игрушка'},
        {id:'w45', cat:'misc',    emoji:'🎵', label:'Музыка'},
        {id:'w46', cat:'misc',    emoji:'📱', label:'Телефон'},
        {id:'w47', cat:'misc',    emoji:'😴', label:'Спать'},
        {id:'w48', cat:'misc',    emoji:'🛍️', label:'Магазин'},
        {id:'w49', cat:'misc',    emoji:'🎮', label:'Играть'},
        {id:'w50', cat:'misc',    emoji:'🌙', label:'Ночь'},
    ];

    const PLANET_COLORS = {
        people:   [['#4a90d9','#1a5fa0'],['#5ba3e8','#2a77c2']],
        actions:  [['#9b59b6','#6c3483'],['#a569bd','#76448a']],
        food:     [['#e67e22','#b7590a'],['#f39c12','#d68910']],
        feelings: [['#e74c3c','#922b21'],['#ec7063','#c0392b']],
        places:   [['#27ae60','#1a7a40'],['#2ecc71','#229954']],
        misc:     [['#d0ae8b','#9a7a5a'],['#e8c9a0','#c4956a']],
    };

    let activeCategory = 'all';
    let sentence = [];
    let planets = [];
    let tiltX = 0, tiltY = 0;
    let voiceReady = false;

    // ========== STARFIELD ==========
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        const count = Math.floor((canvas.width * canvas.height) / 3500);
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5 + 0.3,
                a: Math.random(),
                speed: Math.random() * 0.008 + 0.002,
                phase: Math.random() * Math.PI * 2
            });
        }
    }

    function drawStars(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            const alpha = 0.3 + 0.5 * Math.sin(t * s.speed + s.phase);
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.fill();
        });
        requestAnimationFrame(drawStars);
    }

    initStars();
    requestAnimationFrame(drawStars);
    window.addEventListener('resize', initStars);

    // ========== CATEGORIES ==========
    const catBar = document.getElementById('catBar');
    CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (cat.id === 'all' ? ' active' : '');
        btn.textContent = cat.label;
        btn.dataset.cat = cat.id;
        if (cat.color) btn.style.background = `linear-gradient(135deg, ${cat.color[0]}, ${cat.color[1]})`;
        btn.addEventListener('click', () => {
            activeCategory = cat.id;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('active');
                b.style.borderColor = 'rgba(255,255,255,0.1)';
            });
            btn.classList.add('active');
            if (cat.color) btn.style.borderColor = 'transparent';
            renderPlanets();
        });
        catBar.appendChild(btn);
    });

    // ========== PLANETS ==========
    const stage = document.getElementById('cosmosStage');

    function getWords() {
        return activeCategory === 'all' ? WORDS : WORDS.filter(w => w.cat === activeCategory);
    }

    function randomFloat(min, max) { return min + Math.random() * (max - min); }

    function renderPlanets() {
        stage.innerHTML = '';
        planets = [];
        const words = getWords();
        const stageW = stage.clientWidth;
        const stageH = stage.clientHeight;
        const count = words.length;

        // Size based on count
        const baseSize = Math.min(stageW, stageH) / (count > 20 ? 6.5 : count > 10 ? 5.5 : 4.5);
        const minSize = Math.max(62, baseSize);
        const maxSize = minSize * 1.4;

        // Use grid + jitter for collision-free placement
        const cols = Math.ceil(Math.sqrt(count * stageW / stageH));
        const rows = Math.ceil(count / cols);
        const cellW = stageW / cols;
        const cellH = stageH / rows;
        const jitter = 0.28;

        words.forEach((word, i) => {
            const size = randomFloat(minSize, maxSize);
            const col = i % cols;
            const row = Math.floor(i / cols);
            const cx = cellW * (col + 0.5) + (Math.random() - 0.5) * cellW * jitter;
            const cy = cellH * (row + 0.5) + (Math.random() - 0.5) * cellH * jitter;
            const x = Math.max(size/2 + 4, Math.min(stageW - size/2 - 4, cx));
            const y = Math.max(size/2 + 4, Math.min(stageH - size/2 - 4, cy));

            const colors = PLANET_COLORS[word.cat] || PLANET_COLORS.misc;
            const colorPair = colors[Math.floor(Math.random() * colors.length)];
            const floatDur = randomFloat(4, 8);
            const floatDelay = randomFloat(0, 4);
            const floatAmp = randomFloat(8, 18);
            const floatAmpX = randomFloat(6, 14);

            const el = document.createElement('div');
            el.className = 'planet';
            el.style.cssText = `
                width:${size}px; height:${size}px;
                left:${x - size/2}px; top:${y - size/2}px;
                font-size:${size * 0.18}px;
            `;

            const inner = document.createElement('div');
            inner.className = 'planet-inner';
            inner.style.cssText = `
                background: radial-gradient(circle at 35% 35%, ${colorPair[0]}, ${colorPair[1]});
                box-shadow: 0 0 ${size*0.3}px rgba(${hexToRgb(colorPair[0])}, 0.35),
                            inset 0 -${size*0.05}px ${size*0.1}px rgba(0,0,0,0.3);
            `;
            inner.innerHTML = `<span class="planet-emoji">${word.emoji}</span><span class="planet-label">${word.label}</span>`;

            el.appendChild(inner);
            el.addEventListener('click', e => onPlanetClick(e, el, word, colorPair));

            // Floating animation via JS
            planets.push({ el, baseX: x - size/2, baseY: y - size/2, floatDur, floatDelay, floatAmp, floatAmpX });
            stage.appendChild(el);
        });

        startFloatAnimation();
    }

    let floatAnimId = null;
    function startFloatAnimation() {
        if (floatAnimId) cancelAnimationFrame(floatAnimId);
        const start = performance.now();
        function frame(now) {
            const t = (now - start) / 1000;
            planets.forEach(p => {
                const ox = Math.sin(t / (p.floatDur * 0.7) + p.floatDelay) * p.floatAmpX + tiltX * 12;
                const oy = Math.sin(t / p.floatDur + p.floatDelay) * p.floatAmp + tiltY * 12;
                p.el.style.transform = `translate(${ox}px, ${oy}px)`;
            });
            floatAnimId = requestAnimationFrame(frame);
        }
        floatAnimId = requestAnimationFrame(frame);
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `${r},${g},${b}`;
    }

    // ========== TILT ==========
    window.addEventListener('deviceorientation', e => {
        tiltX = Math.max(-1, Math.min(1, (e.gamma || 0) / 30));
        tiltY = Math.max(-1, Math.min(1, (e.beta  || 0) / 40));
    });

    // ========== CLICK PLANET ==========
    function onPlanetClick(e, el, word, colorPair) {
        el.classList.remove('tapped');
        void el.offsetWidth;
        el.classList.add('tapped');
        spawnRipple(e.clientX, e.clientY, colorPair[0]);
        spawnParticles(e.clientX, e.clientY, colorPair[0]);
        addToSentence(word, colorPair);
        speak(word.label);
    }

    function spawnRipple(x, y, color) {
        const r = document.createElement('div');
        r.className = 'ripple';
        r.style.cssText = `left:${x-30}px;top:${y-30}px;width:60px;height:60px;background:${color};`;
        document.body.appendChild(r);
        r.addEventListener('animationend', () => r.remove());
    }

    function spawnParticles(x, y, color) {
        for (let i = 0; i < 8; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const angle = (i / 8) * Math.PI * 2;
            const dist = 40 + Math.random() * 40;
            const tx = Math.cos(angle) * dist;
            const ty = Math.sin(angle) * dist;
            p.style.cssText = `left:${x-4}px;top:${y-4}px;width:8px;height:8px;background:${color};--tx:translateX(${tx}px);--ty:translateY(${ty}px);animation-delay:${i*0.03}s`;
            document.body.appendChild(p);
            p.addEventListener('animationend', () => p.remove());
        }
    }

    // ========== SENTENCE ==========
    const sentenceBar = document.getElementById('sentenceBar');
    const sentenceEmpty = document.getElementById('sentenceEmpty');

    function addToSentence(word, colorPair) {
        sentence.push({ word, colorPair });
        renderSentence();
    }

    function renderSentence() {
        sentenceBar.innerHTML = '';
        if (sentence.length === 0) {
            sentenceBar.appendChild(sentenceEmpty);
            return;
        }
        sentence.forEach((item, i) => {
            const span = document.createElement('span');
            span.className = 'sentence-word';
            span.style.background = `linear-gradient(135deg, ${item.colorPair[0]}, ${item.colorPair[1]})`;
            span.innerHTML = `${item.word.emoji} ${item.word.label} <span class="rm" data-idx="${i}">✕</span>`;
            span.querySelector('.rm').addEventListener('click', e => {
                e.stopPropagation();
                sentence.splice(parseInt(e.target.dataset.idx), 1);
                renderSentence();
            });
            span.addEventListener('click', () => speak(item.word.label));
            sentenceBar.appendChild(span);
        });
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
        sentence = [];
        renderSentence();
    });

    // ========== SPEAK ==========
    let synth = window.speechSynthesis;
    let ruVoice = null;

    function initVoice() {
        const voices = synth.getVoices();
        ruVoice = voices.find(v => v.lang.startsWith('ru') && v.localService) ||
                  voices.find(v => v.lang.startsWith('ru')) ||
                  voices.find(v => v.lang.startsWith('en'));
    }
    synth.addEventListener('voiceschanged', initVoice);
    initVoice();

    function speak(text) {
        if (!synth) return;
        synth.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'ru-RU';
        utt.rate = 0.85;
        utt.pitch = 1.1;
        if (ruVoice) utt.voice = ruVoice;
        synth.speak(utt);
    }

    const speakFab = document.getElementById('speakFab');
    speakFab.addEventListener('click', () => {
        if (sentence.length === 0) return;
        const fullText = sentence.map(s => s.word.label).join(' ');
        speak(fullText);
        speakFab.classList.add('speaking');
        setTimeout(() => speakFab.classList.remove('speaking'), 2000);
    });

    // ========== INIT ==========
    renderPlanets();
    window.addEventListener('resize', renderPlanets);
})();
</script>

<script>
    // Theme toggle + PWA
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    let deferredPrompt;
    const isIos = () => /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    const isStandalone = () => ('standalone' in navigator) && navigator.standalone;
    window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; });
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
