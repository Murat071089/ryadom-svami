<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#d0ae8b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1a2535" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="30%" stop-color="#ffd54f"/>
      <stop offset="60%" stop-color="#d0ae8b"/>
      <stop offset="100%" stop-color="#b8936a"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0ae8b"/>
      <stop offset="100%" stop-color="#8a6d4b"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="60" cy="60" r="55" fill="url(#glow)"/>
  
  <!-- Outer glow of headphones -->
  <path d="M30 65 C30 42 42 28 60 28 C78 28 90 42 90 65" 
        stroke="#ffd700" stroke-width="5" fill="none" stroke-linecap="round"
        filter="url(#outerGlow)" opacity="0.4"/>
  
  <!-- Headband -->
  <path d="M30 65 C30 42 42 28 60 28 C78 28 90 42 90 65" 
        stroke="url(#gold)" stroke-width="4.5" fill="none" stroke-linecap="round"
        filter="url(#softGlow)"/>
  
  <!-- Left ear cup - outer -->
  <rect x="22" y="58" width="18" height="28" rx="9" ry="9" 
        fill="url(#gold)" filter="url(#softGlow)"/>
  <!-- Left ear cup - inner -->
  <rect x="25" y="61" width="12" height="22" rx="6" ry="6" 
        fill="url(#goldDark)" opacity="0.6"/>
  
  <!-- Right ear cup - outer -->
  <rect x="80" y="58" width="18" height="28" rx="9" ry="9" 
        fill="url(#gold)" filter="url(#softGlow)"/>
  <!-- Right ear cup - inner -->
  <rect x="83" y="61" width="12" height="22" rx="6" ry="6" 
        fill="url(#goldDark)" opacity="0.6"/>

  <!-- Sound waves left -->
  <path d="M44 72 Q48 72 48 68" stroke="#ffd700" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M46 75 Q52 75 52 67" stroke="#ffd700" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Sound waves right -->
  <path d="M76 72 Q72 72 72 68" stroke="#ffd700" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M74 75 Q68 75 68 67" stroke="#ffd700" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Sparkle dots -->
  <circle cx="50" cy="40" r="1.5" fill="#ffe082" opacity="0.7"/>
  <circle cx="72" cy="36" r="1" fill="#ffd54f" opacity="0.5"/>
  <circle cx="42" cy="50" r="1" fill="#ffe082" opacity="0.4"/>
</svg>
