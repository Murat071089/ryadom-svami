            (function() {

                const overlay = document.getElementById('navDropdownOverlay');
                if (!btn || !content) return;
                document.body.appendChild(overlay);

                function open() {
                    if (window.innerWidth > 768) { const r = btn.getBoundingClientRect(); content.style.top = (r.bottom + 10) + 'px'; content.style.right = (window.innerWidth - r.right) + 'px'; content.style.bottom = 'auto'; }
                    else { content.style.top = ''; content.style.right = ''; content.style.bottom = '0'; document.body.style.overflow = 'hidden'; }
                    content.classList.add('show'); overlay.classList.add('show'); btn.classList.add('active'); btn.setAttribute('aria-expanded', 'true');
                }
                function close() { content.classList.remove('show'); overlay.classList.remove('show'); btn.classList.remove('active'); btn.setAttribute('aria-expanded', 'false'); document.body.style.overflow = ''; }
                btn.addEventListener('click', (e) => { e.stopPropagation(); content.classList.contains('show') ? close() : open(); });
                overlay.addEventListener('click', close);
                document.addEventListener('click', (e) => { if (!btn.contains(e.target) && !content.contains(e.target)) close(); });

            if (!btn || isRunning) return;
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            totalSeconds = parseInt(btn.dataset.min) * 60;
            remainingSeconds = totalSeconds;
            updateDisplay();
            label.textContent = 'Готов к запуску';
        });

        function updateDisplay() {
            const m = Math.floor(remainingSeconds / 60);
            const s = remainingSeconds % 60;
            digits.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            const pct = totalSeconds > 0 ? (totalSeconds - remainingSeconds) / totalSeconds : 0;
            progress.setAttribute('stroke-dashoffset', String(CIRCUMFERENCE * pct));
            progress.classList.remove('warning','danger');
            if (totalSeconds > 0) {
                if (pct > 0.85) progress.classList.add('danger');
                else if (pct > 0.7) progress.classList.add('warning');
            }
        }

        btnStart.addEventListener('click', function() {
            if (totalSeconds === 0) return;
            if (!isRunning) startTimer();
        });

        btnPause.addEventListener('click', function() {
            if (isRunning) pauseTimer();
        });

        btnReset.addEventListener('click', function() {
            clearInterval(timerInterval);
            isRunning = false;
            remainingSeconds = totalSeconds;
            updateDisplay();
            btnStart.style.display = '';
            btnPause.style.display = 'none';
            label.textContent = totalSeconds > 0 ? 'Готов к запуску' : 'Выберите время';
        });

        function startTimer() {
            isRunning = true;
            btnStart.style.display = 'none';
            btnPause.style.display = '';
            label.textContent = 'Идёт отсчёт...';
            timerInterval = setInterval(function() {
                remainingSeconds--;
                updateDisplay();
                if (remainingSeconds <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    btnStart.style.display = '';
                    btnPause.style.display = 'none';
                    label.textContent = 'Завершено!';
                    timerDone();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            btnStart.style.display = '';
            btnPause.style.display = 'none';
            label.textContent = 'На паузе';
        }

        function timerDone() {
            if (soundEnabled) playSound();
            document.getElementById('timerDone').classList.add('visible');
        }

        document.getElementById('timerDoneClose').addEventListener('click', function() {
            document.getElementById('timerDone').classList.remove('visible');
        });

        function playSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.3, 0.6].forEach(function(t) {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = 523;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, ctx.currentTime + t);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + t + 0.25);
                    osc.start(ctx.currentTime + t);
                    osc.stop(ctx.currentTime + t + 0.3);
                });
            } catch(e) {}
        }

        // Sound toggle
        var soundOnBtn = document.getElementById('soundOn');
        var soundOffBtn = document.getElementById('soundOff');
        soundOnBtn.addEventListener('click', function() { soundEnabled = true; soundOnBtn.classList.add('active'); soundOffBtn.classList.remove('active'); });
        soundOffBtn.addEventListener('click', function() { soundEnabled = false; soundOffBtn.classList.add('active'); soundOnBtn.classList.remove('active'); });

        // ========== SCHEDULE ==========
        const EMOJIS = ['🍽️','🚶','📚','😴','🛁','🧸','🚗','🏥','🎨','🎵','💊','👨‍👩‍👦','🏊','📺','🧹','✏️','🥛','🍎'];
        const TEMPLATES = {
            weekday: [{e:'🍽️',n:'Завтрак'},{e:'💊',n:'Лекарства'},{e:'📚',n:'Занятие'},{e:'🚶',n:'Прогулка'},{e:'🍽️',n:'Обед'},{e:'😴',n:'Дневной сон'},{e:'🧸',n:'Игра'},{e:'🛁',n:'Душ'},{e:'🍽️',n:'Ужин'},{e:'😴',n:'Сон'}],
            weekend: [{e:'😴',n:'Поспать подольше'},{e:'🍽️',n:'Завтрак'},{e:'🧸',n:'Игра'},{e:'🚶',n:'Прогулка'},{e:'🍽️',n:'Обед'},{e:'🎨',n:'Творчество'},{e:'📺',n:'Мультики'},{e:'🛁',n:'Ванна'},{e:'🍽️',n:'Ужин'},{e:'😴',n:'Сон'}],
            therapy: [{e:'🍽️',n:'Завтрак'},{e:'🚗',n:'Дорога'},{e:'🏥',n:'Терапия'},{e:'🚗',n:'Обратно'},{e:'🍽️',n:'Обед'},{e:'😴',n:'Отдых'},{e:'🧸',n:'Игра'},{e:'🍽️',n:'Ужин'},{e:'😴',n:'Сон'}],
            trip: [{e:'🍽️',n:'Завтрак'},{e:'🧹',n:'Собраться'},{e:'🚗',n:'Поездка'},{e:'🍽️',n:'Обед в дороге'},{e:'🚗',n:'Обратно'},{e:'🛁',n:'Помыться'},{e:'🍽️',n:'Ужин'},{e:'😴',n:'Сон'}]
        };

        let tasks = JSON.parse(localStorage.getItem('dailyScheduleData') || '[]');
        let selectedEmoji = '🍽️';
        let editingIdx = -1;
        let dragSrcIdx = null;

        function saveTasks() {
            localStorage.setItem('dailyScheduleData', JSON.stringify(tasks));
            // Save copy for "yesterday"
            localStorage.setItem('dailyScheduleYesterday', JSON.stringify(tasks));
        }

        function renderTasks() {
            var list = document.getElementById('taskList');
            if (tasks.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Создайте первое расписание дня 💛</p></div>';
                document.getElementById('templateBtns').style.display = 'flex';
            } else {
                document.getElementById('templateBtns').style.display = 'none';
                list.innerHTML = '';
                tasks.forEach(function(t, i) {
                    var card = document.createElement('div');
                    card.className = 'task-card' + (t.done ? ' completed' : '');
                    card.draggable = true;
                    card.dataset.idx = i;
                    card.innerHTML = '<div class="task-emoji">' + t.e + '</div>' +
                        '<div class="task-info"><div class="task-name">' + escHtml(t.n) + '</div></div>' +
                        '<div class="task-actions">' +
                        '<button class="task-action-btn done-btn" title="Выполнено" data-act="done">' + (t.done ? '↩️' : '✅') + '</button>' +
                        '<button class="task-action-btn" title="Редактировать" data-act="edit">✏️</button>' +
                        '<button class="task-action-btn del-btn" title="Удалить" data-act="del">🗑️</button>' +
                        '</div>';
                    // Drag events
                    card.addEventListener('dragstart', function(ev) { dragSrcIdx = i; card.classList.add('dragging'); ev.dataTransfer.effectAllowed = 'move'; });
                    card.addEventListener('dragend', function() { card.classList.remove('dragging'); dragSrcIdx = null; });
                    card.addEventListener('dragover', function(ev) { ev.preventDefault(); ev.dataTransfer.dropEffect = 'move'; });
                    card.addEventListener('drop', function(ev) {
                        ev.preventDefault();
                        if (dragSrcIdx !== null && dragSrcIdx !== i) {
                            var item = tasks.splice(dragSrcIdx, 1)[0];
                            tasks.splice(i, 0, item);
                            saveTasks(); renderTasks();
                        }
                    });
                    // Touch reorder
                    var touchY = 0;
                    card.addEventListener('touchstart', function(ev) { touchY = ev.touches[0].clientY; }, {passive:true});
                    card.addEventListener('touchend', function(ev) {
                        var dy = ev.changedTouches[0].clientY - touchY;
                        if (Math.abs(dy) > 60) {
                            var dir = dy > 0 ? 1 : -1;
                            var newIdx = Math.max(0, Math.min(tasks.length-1, i + dir));
                            if (newIdx !== i) { var item = tasks.splice(i,1)[0]; tasks.splice(newIdx,0,item); saveTasks(); renderTasks(); }
                        }
                    }, {passive:true});
                    list.appendChild(card);
                });
            }
            updateProgress();
        }

        function updateProgress() {
            var total = tasks.length, done = tasks.filter(function(t){return t.done;}).length;
            document.getElementById('progressLabel').textContent = 'Выполнено ' + done + ' из ' + total;
            var pct = total > 0 ? Math.round(done/total*100) : 0;
            document.getElementById('progressPct').textContent = pct + '%';
            document.getElementById('progressFill').style.width = pct + '%';
        }

        // Task actions
        document.getElementById('taskList').addEventListener('click', function(e) {
            var btn = e.target.closest('[data-act]');
            if (!btn) return;
            var card = btn.closest('.task-card');
            var idx = parseInt(card.dataset.idx);
            var act = btn.dataset.act;
            if (act === 'done') { tasks[idx].done = !tasks[idx].done; saveTasks(); renderTasks(); }
            else if (act === 'del') { tasks.splice(idx, 1); saveTasks(); renderTasks(); }
            else if (act === 'edit') { openEditModal(idx); }
        });

        // Modal
        var modal = document.getElementById('addTaskModal');
        var nameInput = document.getElementById('taskNameInput');
        var emojiPicker = document.getElementById('emojiPicker');

        EMOJIS.forEach(function(em) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'emoji-pick' + (em === selectedEmoji ? ' selected' : '');
            btn.textContent = em;
            btn.addEventListener('click', function() {
                document.querySelectorAll('.emoji-pick').forEach(function(b){b.classList.remove('selected');});
                btn.classList.add('selected');
                selectedEmoji = em;
            });
            emojiPicker.appendChild(btn);
        });

        document.getElementById('addTaskBtn').addEventListener('click', function() {
            editingIdx = -1;
            nameInput.value = '';
            selectedEmoji = '🍽️';
            document.querySelectorAll('.emoji-pick').forEach(function(b){ b.classList.toggle('selected', b.textContent === selectedEmoji); });
            modal.classList.add('visible');
            setTimeout(function(){ nameInput.focus(); }, 100);
        });

        function openEditModal(idx) {
            editingIdx = idx;
            nameInput.value = tasks[idx].n;
            selectedEmoji = tasks[idx].e;
            document.querySelectorAll('.emoji-pick').forEach(function(b){ b.classList.toggle('selected', b.textContent === selectedEmoji); });
            modal.classList.add('visible');
            setTimeout(function(){ nameInput.focus(); }, 100);
        }

        document.getElementById('modalCancel').addEventListener('click', function() { modal.classList.remove('visible'); });
        modal.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('visible'); });

        document.getElementById('modalSave').addEventListener('click', function() {
            var name = nameInput.value.trim();
            if (!name) { nameInput.style.borderColor = '#ef4444'; return; }
            if (editingIdx >= 0) { tasks[editingIdx].n = name; tasks[editingIdx].e = selectedEmoji; }
            else { tasks.push({e: selectedEmoji, n: name, done: false}); }
            saveTasks(); renderTasks();
            modal.classList.remove('visible');
        });

        nameInput.addEventListener('input', function() { nameInput.style.borderColor = ''; });
        nameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('modalSave').click(); });

        // Templates
        document.getElementById('templateBtns').addEventListener('click', function(e) {
            var btn = e.target.closest('.tpl-btn');
            if (!btn) return;
            var tpl = btn.dataset.tpl;
            if (tpl === 'yesterday') {
                var y = JSON.parse(localStorage.getItem('dailyScheduleYesterday') || '[]');
                if (y.length > 0) { tasks = y.map(function(t){ return {e:t.e, n:t.n, done:false}; }); }
                else { return; }
            } else if (TEMPLATES[tpl]) {
                tasks = TEMPLATES[tpl].map(function(t){ return {e:t.e, n:t.n, done:false}; });
            }
            saveTasks(); renderTasks();
        });

        function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        renderTasks();
    })();
    </script>

    <!-- Theme toggle -->
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        themeToggle.addEventListener('click', () => {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
        });
    </script>
    <script>
        // PWA Install Logic
        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');

        const isIos = () => {
            const userAgent = window.navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(userAgent);
        };
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

        if (installBtn && isIos() && !isInStandaloneMode()) {
            installBtn.style.display = 'inline-flex';
            installBtn.addEventListener('click', () => {
                alert('Чтобы установить приложение на iPhone:\n\n1. Нажмите кнопку "Поделиться" (квадрат со стрелочкой) внизу экрана браузера.\n2. Выберите "На экран Домой" (Add to Home Screen).');
            });
        } else {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault(); deferredPrompt = e;
                if (installBtn) installBtn.style.display = 'inline-flex';
            });
            if (installBtn) {
                installBtn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') installBtn.style.display = 'none';
                        deferredPrompt = null;
                    }
                });
            }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
